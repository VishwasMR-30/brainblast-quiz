<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainBlast Quiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #07060f;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --text: #f4f0ff;
      --muted: rgba(244,240,255,0.45);
      --font-display: 'Unbounded', cursive, sans-serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --c-science: #00f5d4;
      --c-history:  #ff9e00;
      --c-tech:     #ff48c4;
      --c-geo:      #7bed9f;
      --accent: var(--c-science);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ORBS */
    .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:floatOrb 12s ease-in-out infinite; }
    .orb1 { width:380px; height:380px; background:rgba(0,245,212,0.18); top:-80px; left:-100px; animation-delay:0s; }
    .orb2 { width:300px; height:300px; background:rgba(255,72,196,0.15); bottom:-60px; right:-80px; animation-delay:-4s; }
    .orb3 { width:240px; height:240px; background:rgba(255,158,0,0.12); bottom:20%; left:10%; animation-delay:-7s; }
    .orb4 { width:200px; height:200px; background:rgba(123,237,159,0.1); top:30%; right:5%; animation-delay:-2s; }
    @keyframes floatOrb {
      0%,100% { transform:translate(0,0) scale(1); }
      33% { transform:translate(20px,-20px) scale(1.05); }
      66% { transform:translate(-15px,15px) scale(0.97); }
    }

    .app { position:relative; z-index:1; width:100%; max-width:560px; padding:20px; }
    .glass { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-radius:24px; }
    .screen { width:100%; }
    .hidden { display:none !important; }

    /* START */
    .start-card { padding:48px 40px; text-align:center; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.88) translateY(20px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .logo-wrap { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px; }
    .logo-icon { font-size:36px; filter:drop-shadow(0 0 12px #00f5d4); animation:iconPulse 2s ease-in-out infinite; }
    @keyframes iconPulse {
      0%,100% { filter:drop-shadow(0 0 12px #00f5d4); }
      50%      { filter:drop-shadow(0 0 28px #00f5d4) drop-shadow(0 0 50px #00f5d4); }
    }
    .logo-text { font-family:var(--font-display); font-size:32px; font-weight:900; letter-spacing:-1px; color:#fff; }
    .logo-text span { background:linear-gradient(135deg,#00f5d4,#ff48c4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .tagline { font-size:15px; color:var(--muted); line-height:1.7; margin-bottom:32px; }
    .stats-row { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:36px; padding:18px 24px; background:rgba(255,255,255,0.04); border-radius:14px; border:1px solid rgba(255,255,255,0.07); }
    .stat { text-align:center; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
    .stat span { display:block; font-family:var(--font-display); font-size:22px; font-weight:700; color:#fff; margin-bottom:2px; }
    .stat-div { width:1px; height:36px; background:rgba(255,255,255,0.1); }
    .btn-start { position:relative; width:100%; padding:18px; font-family:var(--font-display); font-size:15px; font-weight:700; letter-spacing:0.05em; color:#07060f; background:linear-gradient(135deg,#00f5d4,#00c9a7); border:none; border-radius:14px; cursor:pointer; overflow:hidden; transition:transform 0.2s,box-shadow 0.2s; margin-bottom:20px; }
    .btn-start:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(0,245,212,0.5),0 8px 30px rgba(0,0,0,0.3); }
    .btn-start:active { transform:scale(0.98); }
    .btn-glow { position:absolute; inset:0; background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.25) 70%); border-radius:14px; }
    .credit { font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:0.05em; }

    /* QUIZ */
    .quiz-wrap { display:flex; flex-direction:column; gap:16px; animation:slideIn 0.4s ease both; }
    @keyframes slideIn {
      from { opacity:0; transform:translateX(30px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .quiz-topbar { display:flex; align-items:center; justify-content:space-between; padding:0 4px; }
    .q-counter { font-family:var(--font-display); font-size:20px; font-weight:700; }
    .q-sep { color:var(--muted); margin:0 3px; font-size:14px; }
    .timer-wrap { position:relative; width:54px; height:54px; display:flex; align-items:center; justify-content:center; }
    .timer-ring { position:absolute; inset:0; transform:rotate(-90deg); }
    .ring-bg { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:3; }
    .ring-fill { fill:none; stroke:var(--accent); stroke-width:3; stroke-linecap:round; stroke-dasharray:113; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear,stroke 0.5s; filter:drop-shadow(0 0 4px var(--accent)); }
    .timer-num { font-family:var(--font-display); font-size:16px; font-weight:700; position:relative; z-index:1; }
    .score-wrap { text-align:right; }
    .score-label { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    .score-val { font-family:var(--font-display); font-size:24px; font-weight:700; color:#fff; transition:color 0.3s; }
    .progress-bar-wrap { height:4px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),#ff48c4); border-radius:99px; transition:width 0.5s ease; width:0%; }
    .category-badge { display:inline-block; align-self:flex-start; padding:6px 16px; border-radius:99px; font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; background:rgba(0,245,212,0.12); color:var(--accent); border:1px solid rgba(0,245,212,0.25); transition:background 0.3s,color 0.3s,border-color 0.3s; }
    .question-card { padding:28px; min-height:110px; display:flex; align-items:center; }
    .question-text { font-size:18px; font-weight:600; line-height:1.5; color:#fff; }
    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .option-btn { position:relative; padding:18px 16px; background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.1); border-radius:16px; color:var(--text); font-family:var(--font-body); font-size:14px; font-weight:500; cursor:pointer; text-align:left; transition:background 0.2s,border-color 0.2s,transform 0.15s; line-height:1.4; overflow:hidden; }
    .option-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent,rgba(255,255,255,0.04)); border-radius:16px; }
    .option-btn:hover:not(:disabled) { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.25); transform:translateY(-2px); }
    .option-btn:active:not(:disabled) { transform:scale(0.97); }
    .option-letter { display:block; font-family:var(--font-display); font-size:10px; font-weight:700; color:var(--muted); margin-bottom:6px; letter-spacing:0.08em; }
    .option-btn.correct { background:rgba(0,245,212,0.18) !important; border-color:#00f5d4 !important; color:#00f5d4; box-shadow:0 0 24px rgba(0,245,212,0.25); }
    .option-btn.wrong { background:rgba(255,80,80,0.15) !important; border-color:#ff5050 !important; color:#ff5050; box-shadow:0 0 24px rgba(255,80,80,0.2); animation:shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
    .result-flash { text-align:center; font-family:var(--font-display); font-size:20px; font-weight:700; padding:16px; border-radius:14px; animation:flashIn 0.3s ease both; }
    .result-flash.correct-flash { background:rgba(0,245,212,0.1); color:#00f5d4; border:1px solid rgba(0,245,212,0.2); }
    .result-flash.wrong-flash { background:rgba(255,80,80,0.1); color:#ff5050; border:1px solid rgba(255,80,80,0.2); }
    .result-flash.timeout-flash { background:rgba(255,158,0,0.1); color:#ff9e00; border:1px solid rgba(255,158,0,0.2); }
    @keyframes flashIn { from{opacity:0;transform:scale(0.9);} to{opacity:1;transform:scale(1);} }

    /* RESULT */
    .result-card { padding:48px 36px; text-align:center; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    .result-emoji { font-size:56px; margin-bottom:16px; animation:bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
    @keyframes bounceIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
    .result-title { font-family:var(--font-display); font-size:36px; font-weight:900; letter-spacing:-1px; margin-bottom:8px; background:linear-gradient(135deg,#00f5d4,#ff48c4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .result-sub { color:var(--muted); font-size:15px; margin-bottom:32px; }
    .final-score-ring { position:relative; width:140px; height:140px; margin:0 auto 28px; display:flex; align-items:center; justify-content:center; }
    .final-score-ring svg { position:absolute; inset:0; transform:rotate(-90deg); }
    .score-ring-bg { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:6; }
    .score-ring-fill { fill:none; stroke:#00f5d4; stroke-width:6; stroke-linecap:round; stroke-dasharray:314; stroke-dashoffset:314; transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s; filter:drop-shadow(0 0 8px #00f5d4); }
    .final-score-text { position:relative; z-index:1; }
    .final-score-text span { font-family:var(--font-display); font-size:40px; font-weight:900; display:block; line-height:1; }
    .final-score-text small { font-size:13px; color:var(--muted); }
    .breakdown { display:flex; gap:10px; justify-content:center; margin-bottom:32px; flex-wrap:wrap; }
    .breakdown-dot { width:28px; height:28px; border-radius:50%; font-size:13px; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .breakdown-dot.correct-dot { background:rgba(0,245,212,0.2); border:1.5px solid #00f5d4; color:#00f5d4; }
    .breakdown-dot.wrong-dot { background:rgba(255,80,80,0.15); border:1.5px solid #ff5050; color:#ff5050; }
    .breakdown-dot.skip-dot { background:rgba(255,158,0,0.12); border:1.5px solid #ff9e00; color:#ff9e00; }
    .btn-restart { width:100%; padding:16px; font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:0.05em; color:#07060f; background:linear-gradient(135deg,#ff48c4,#ff9e00); border:none; border-radius:14px; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; }
    .btn-restart:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(255,72,196,0.4),0 8px 30px rgba(0,0,0,0.3); }

    @media(max-width:480px){
      .start-card,.result-card{padding:32px 24px;}
      .options-grid{grid-template-columns:1fr;}
      .question-text{font-size:16px;}
      .logo-text{font-size:24px;}
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>

  <div class="app">

    <!-- START -->
    <div class="screen" id="screen-start">
      <div class="start-card glass">
        <div class="logo-wrap">
          <div class="logo-icon">⚡</div>
          <h1 class="logo-text">Brain<span>Blast</span></h1>
        </div>
        <p class="tagline">10 questions. 15 seconds each.<br>How smart are you?</p>
        <div class="stats-row">
          <div class="stat"><span>10</span>Questions</div>
          <div class="stat-div"></div>
          <div class="stat"><span>15s</span>Per Q</div>
          <div class="stat-div"></div>
          <div class="stat"><span>4</span>Topics</div>
        </div>
        <button class="btn-start" id="btnStart">
          <span>Start Quiz</span>
          <div class="btn-glow"></div>
        </button>
        <p class="credit">Built for InternSpark · Task 2</p>
      </div>
    </div>

    <!-- QUIZ -->
    <div class="screen hidden" id="screen-quiz">
      <div class="quiz-wrap">
        <div class="quiz-topbar">
          <div class="q-counter"><span id="qCurrent">1</span><span class="q-sep">/</span><span id="qTotal">10</span></div>
          <div class="timer-wrap">
            <svg class="timer-ring" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" class="ring-bg"/>
              <circle cx="22" cy="22" r="18" class="ring-fill" id="timerRing"/>
            </svg>
            <span class="timer-num" id="timerNum">15</span>
          </div>
          <div class="score-wrap">
            <span class="score-label">Score</span>
            <span class="score-val" id="scoreVal">0</span>
          </div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="category-badge" id="categoryBadge">Science</div>
        <div class="question-card glass" id="questionCard">
          <p class="question-text" id="questionText">Loading...</p>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="result-flash hidden" id="resultFlash"></div>
      </div>
    </div>

    <!-- RESULT -->
    <div class="screen hidden" id="screen-result">
      <div class="result-card glass">
        <div class="result-emoji" id="resultEmoji">🏆</div>
        <h2 class="result-title" id="resultTitle">Genius!</h2>
        <p class="result-sub" id="resultSub">You nailed it!</p>
        <div class="final-score-ring">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" class="score-ring-bg"/>
            <circle cx="60" cy="60" r="50" class="score-ring-fill" id="scoreRingFill"/>
          </svg>
          <div class="final-score-text">
            <span id="finalScore">0</span>
            <small>/10</small>
          </div>
        </div>
        <div class="breakdown" id="breakdown"></div>
        <button class="btn-restart" id="btnRestart">Play Again ↺</button>
      </div>
    </div>

  </div>

  <script>
    const questions = [
      { category:"Science",    color:"#00f5d4", question:"What is the powerhouse of the cell?",                           options:["Nucleus","Mitochondria","Ribosome","Golgi Body"],                                                                answer:1 },
      { category:"Technology", color:"#ff48c4", question:"What does 'HTML' stand for?",                                   options:["Hyper Text Makeup Language","High Text Markup Language","Hyper Text Markup Language","Hyper Transfer Markup Language"], answer:2 },
      { category:"Geography",  color:"#7bed9f", question:"What is the capital of Australia?",                             options:["Sydney","Melbourne","Brisbane","Canberra"],                                                                   answer:3 },
      { category:"Science",    color:"#00f5d4", question:"How many bones are in the adult human body?",                   options:["206","185","212","196"],                                                                                      answer:0 },
      { category:"Technology", color:"#ff48c4", question:"Which language is primarily used for styling web pages?",       options:["JavaScript","Python","CSS","SQL"],                                                                            answer:2 },
      { category:"History",    color:"#ff9e00", question:"In which year did World War II end?",                           options:["1943","1944","1946","1945"],                                                                                  answer:3 },
      { category:"Geography",  color:"#7bed9f", question:"Which is the longest river in the world?",                     options:["Amazon","Nile","Yangtze","Mississippi"],                                                                      answer:1 },
      { category:"Science",    color:"#00f5d4", question:"What planet is known as the Red Planet?",                      options:["Venus","Jupiter","Saturn","Mars"],                                                                            answer:3 },
      { category:"History",    color:"#ff9e00", question:"Who painted the Mona Lisa?",                                   options:["Michelangelo","Leonardo da Vinci","Raphael","Van Gogh"],                                                      answer:1 },
      { category:"Technology", color:"#ff48c4", question:"What does 'CPU' stand for?",                                   options:["Central Process Unit","Computer Personal Unit","Central Processing Unit","Core Processing Utility"],          answer:2 }
    ];

    let currentQ=0, score=0, timer=null, timeLeft=15, answered=false;
    const results=[];

    const screenStart  = document.getElementById('screen-start');
    const screenQuiz   = document.getElementById('screen-quiz');
    const screenResult = document.getElementById('screen-result');
    const qCurrent     = document.getElementById('qCurrent');
    const qTotal       = document.getElementById('qTotal');
    const timerNum     = document.getElementById('timerNum');
    const timerRing    = document.getElementById('timerRing');
    const scoreVal     = document.getElementById('scoreVal');
    const progressBar  = document.getElementById('progressBar');
    const categoryBadge= document.getElementById('categoryBadge');
    const questionCard = document.getElementById('questionCard');
    const questionText = document.getElementById('questionText');
    const optionsGrid  = document.getElementById('optionsGrid');
    const resultFlash  = document.getElementById('resultFlash');
    const resultEmoji  = document.getElementById('resultEmoji');
    const resultTitle  = document.getElementById('resultTitle');
    const resultSub    = document.getElementById('resultSub');
    const finalScore   = document.getElementById('finalScore');
    const scoreRingFill= document.getElementById('scoreRingFill');
    const breakdown    = document.getElementById('breakdown');

    document.getElementById('btnStart').addEventListener('click', () => {
      screenStart.classList.add('hidden');
      screenQuiz.classList.remove('hidden');
      currentQ=0; score=0; results.length=0;
      qTotal.textContent=questions.length;
      loadQuestion();
    });

    function loadQuestion() {
      answered=false;
      resultFlash.className='result-flash hidden';
      const q=questions[currentQ];
      const letters=['A','B','C','D'];
      qCurrent.textContent=currentQ+1;
      scoreVal.textContent=score;
      progressBar.style.width=((currentQ/questions.length)*100)+'%';
      categoryBadge.textContent=q.category;
      categoryBadge.style.background=hexToRgba(q.color,0.12);
      categoryBadge.style.color=q.color;
      categoryBadge.style.borderColor=hexToRgba(q.color,0.3);
      document.documentElement.style.setProperty('--accent',q.color);
      timerRing.style.stroke=q.color;
      timerRing.style.filter=`drop-shadow(0 0 4px ${q.color})`;
      questionCard.style.animation='none';
      questionCard.offsetHeight;
      questionCard.style.animation='slideIn 0.35s ease both';
      questionText.textContent=q.question;
      optionsGrid.innerHTML='';
      q.options.forEach((opt,i)=>{
        const btn=document.createElement('button');
        btn.className='option-btn';
        btn.innerHTML=`<span class="option-letter">${letters[i]}</span>${opt}`;
        btn.addEventListener('click',()=>selectAnswer(i,btn));
        optionsGrid.appendChild(btn);
      });
      startTimer();
    }

    function startTimer() {
      timeLeft=15; clearInterval(timer); updateTimerDisplay();
      timer=setInterval(()=>{ timeLeft--; updateTimerDisplay(); if(timeLeft<=0){clearInterval(timer);onTimeout();} },1000);
    }

    function updateTimerDisplay() {
      timerNum.textContent=timeLeft;
      timerRing.style.strokeDashoffset=113-(113*timeLeft/15);
      if(timeLeft<=5){
        timerRing.style.stroke='#ff5050';
        timerNum.style.color='#ff5050';
        timerRing.style.filter='drop-shadow(0 0 6px #ff5050)';
      } else { timerNum.style.color=''; }
    }

    function onTimeout() {
      if(answered)return; answered=true; results.push('skip');
      const btns=optionsGrid.querySelectorAll('.option-btn');
      btns.forEach(b=>b.disabled=true);
      btns[questions[currentQ].answer].classList.add('correct');
      showFlash("⏱ Time's up!",'timeout-flash');
      setTimeout(nextQuestion,1800);
    }

    function selectAnswer(index,btn) {
      if(answered)return; answered=true; clearInterval(timer);
      const correct=questions[currentQ].answer;
      const allBtns=optionsGrid.querySelectorAll('.option-btn');
      allBtns.forEach(b=>b.disabled=true);
      if(index===correct){
        btn.classList.add('correct'); score++;
        scoreVal.textContent=score; scoreVal.style.color='#00f5d4';
        setTimeout(()=>scoreVal.style.color='',600);
        results.push('correct'); showFlash('✓ Correct! +1','correct-flash');
      } else {
        btn.classList.add('wrong'); allBtns[correct].classList.add('correct');
        results.push('wrong'); showFlash('✗ Wrong!','wrong-flash');
      }
      setTimeout(nextQuestion,1600);
    }

    function showFlash(msg,cls){ resultFlash.textContent=msg; resultFlash.className=`result-flash ${cls}`; }

    function nextQuestion(){ currentQ++; if(currentQ>=questions.length){showResult();}else{loadQuestion();} }

    function showResult() {
      progressBar.style.width='100%';
      screenQuiz.classList.add('hidden');
      screenResult.classList.remove('hidden');
      finalScore.textContent=score;
      const pct=score/questions.length;
      let emoji,title,sub;
      if(pct===1)       {emoji='🏆';title='Perfect!';   sub='Flawless! You aced every question!';}
      else if(pct>=0.8) {emoji='🎯';title='Brilliant!'; sub='Outstanding performance!';}
      else if(pct>=0.6) {emoji='🔥';title='Great Job!'; sub="You're above average!";}
      else if(pct>=0.4) {emoji='💪';title='Not Bad!';   sub='Room to grow — keep at it!';}
      else              {emoji='📚';title='Keep Going!';sub='Study more and try again!';}
      resultEmoji.textContent=emoji; resultTitle.textContent=title; resultSub.textContent=sub;
      const dashOffset=314-(314*score/questions.length);
      setTimeout(()=>{ scoreRingFill.style.strokeDashoffset=dashOffset; },200);
      breakdown.innerHTML='';
      results.forEach((r,i)=>{
        const dot=document.createElement('div');
        dot.className=`breakdown-dot ${r}-dot`;
        dot.textContent=i+1; dot.title=`Q${i+1}: ${r}`;
        breakdown.appendChild(dot);
      });
    }

    document.getElementById('btnRestart').addEventListener('click',()=>{
      screenResult.classList.add('hidden');
      screenQuiz.classList.remove('hidden');
      currentQ=0; score=0; results.length=0; loadQuestion();
    });

    function hexToRgba(hex,alpha){
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
  </script>
</body>
